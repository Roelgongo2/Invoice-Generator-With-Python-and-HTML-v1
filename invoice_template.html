<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Invoice</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            padding: 40px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            max-width: 800px;
            margin: auto;
        }

        .header {
            background: #1f4e79;
            color: white;
            padding: 15px;
            border-radius: 8px;
        }

        .box {
            background: #eeeeee;
            padding: 15px;
            margin-top: 20px;
            border-radius: 8px;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        th {
            background: #1f4e79;
            color: white;
            padding: 10px;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        .total {
            margin-top: 20px;
            background: #d4edda;
            padding: 15px;
            text-align: right;
            font-size: 20px;
            border-radius: 8px;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>INVOICE</h1>
        <p>Invoice No: {{ invoice_no }}</p>
        <p>Date: {{ date }}</p>
    </div>

    <div class="box">
        <h3>Client</h3>
        <p>{{ client_name }}</p>
    </div>

    <table>
        <tr>
            <th>Item</th>
            <th>Qty</th>
            <th>Price</th>
            <th>Total</th>
        </tr>

        {% for item in items %}
        <tr>
            <td>{{ item[0] }}</td>
            <td>{{ item[1] }}</td>
            <td>${{ item[2] }}</td>
            <td>${{ item[3] }}</td>
        </tr>
        {% endfor %}

    </table>

    <div class="total">
        Grand Total: ${{ grand_total }}
    </div>

</div>

</body>
</html>
